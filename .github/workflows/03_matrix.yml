name: Exercice 05 - Matrix
on:
  push:
    branches: [main, fake_one]
  pull_request:
    branches: [main, fake_one]

jobs:
  test_matrix:
    name: Test API Satisfaction - Python ${{ matrix.python-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Afficher la version Python et l'OS
        run: |
          echo "Python version : ${{ matrix.python-version }}"
          echo "Système d'exploitation : ${{ matrix.os }}"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r api_prediction/requirements.txt

      - name: Run tests with pytest
        run: |
          pytest api_prediction/test_app_satisfaction.py

        