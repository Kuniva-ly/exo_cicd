# 1. Créer un workflow `02_test.yml` qui :
#    - Se déclenche sur push et pull request
#    - Configure Python 3.11.9
#    - Installe les dépendances
#    - Exécute les tests avec pytest
name: Test API Satisfaction
on:
  push:
    branches: [main, fake_one]
  pull_request:
    branches: [main, fake_one]

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11.9

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r api_prediction/requirements.txt
          pip install pytest-cov

      - name: Run tests with pytest and coverage
        id: coverage
        run: |
          pytest api_prediction/test_app_satisfaction.py \
            --cov=api_prediction \
            --cov-report=html:coverage-report \
            --cov-report=term
          PERCENTAGE=$(pytest api_prediction/test_app_satisfaction.py --cov=api_prediction --cov-report=term-missing -q 2>/dev/null | grep TOTAL | awk '{print $4}')
          echo "percentage=$PERCENTAGE" >> $GITHUB_OUTPUT

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/

  report:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Afficher le résultat des tests
        run: |
          echo "Tests terminés avec succès !"
          echo "Couverture de code : ${{ needs.test.outputs.coverage }}"
