# nom du workflow
name: API de satisfaction

# déclencheur du workflow
on: push

# jobs du workflow
jobs:
  first_job:
    name: First Job
    runs-on: ubuntu-latest

    # liste des étapes du job
    steps:

      - name: Welcome message
        run: echo "Bienvenue dans la CI/CD pour l'API de satisfaction !"

      # afficher la date et l'heure du push
      - name: Display push date and time
        run: | 
          echo "Date : $(date '+%Y-%m-%d')"
          echo "Heure : $(date '+%H:%M:%S')"
          echo "timestamp complet : $(date)"
