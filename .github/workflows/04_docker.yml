name: Build and Push Docker
on: push

jobs:
  test:
    name: Tests Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r api_prediction/requirements.txt

      - name: Run tests
        run: pytest api_prediction/test_app_satisfaction.py

  build-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api_satisfaction:latest api_prediction/
          docker push ${{ secrets.DOCKER_USERNAME }}/api_satisfaction:latest
